name: "🐛 Bug Report / 问题反馈"
description: "Report a bug to help improve Clangor. / 报器鸣之瑕，助其尽善"
title: "[Bug]: "
labels: ["bug"]
assignees: ["BD0518"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 鸣谢拨冗相助，共琢器鸣。

  - type: dropdown
    id: loader
    attributes:
      label: "Mod Loader / 加载器"
      description: "Please confirm you are using Fabric. 须为 Fabric。"
      options:
        - Fabric
    validations:
      required: true

  - type: input
    id: minecraft_version
    attributes:
      label: "Minecraft Version / 游戏版本"
      description: "Your game version. 所运行版本为？"
      placeholder: "e.g. 1.21.1 (例: 1.21.1)"
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: "Mod Version / 模组版本"
      description: "Your mod version. 所安装版本为？"
      placeholder: "e.g. 1.0.0 (例: 1.0.0)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Problem Description / 问题描述"
      description: "What happened? 所为何事？"
      placeholder: "Please describe the bug in detail. 请详述。"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce / 重现步骤"
      description: "How to trigger it? 如何重现？"
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: false

  - type: input
    id: log_link
    attributes:
      label: "latest.log / 最新日志"
      description: |
        For best results, please **restart and reproduce** before uploading. 请**重启并重现**后上传，以便分析。
        - **Official Launcher / 官方:** `.minecraft/logs/`
        - **PCL2 (版本隔离):** `.minecraft/versions/[Name]/logs/`
        - **Others / 其他:** `[Game Folder]/logs/`
        Upload to [mclo.gs](https://mclo.gs/) and paste the link. 请上传至 [mclo.gs](https://mclo.gs/) 并粘贴链接于此。
      placeholder: "ex. https://mclo.gs/xxxxxx (例: https://mclo.gs/xxxxxx)"
    validations:
      required: true
